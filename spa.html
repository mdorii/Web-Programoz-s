<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cukrászda – SPA</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .spa-menu { display:flex; gap:.6rem; margin-bottom:1.5rem; border-bottom:2px solid var(--blush); padding-bottom:.8rem; }
    .spa-tab { padding:.6rem 1.4rem; border:none; background:transparent; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.95rem; font-weight:500; color:#888; border-radius:8px 8px 0 0; transition:all .2s; }
    .spa-tab.active { background:var(--burgundy); color:white; }
    .spa-tab:hover:not(.active) { background:var(--blush); color:var(--burgundy); }

    /* Quiz */
    .quiz-card { text-align:center; padding:2rem; }
    .quiz-q    { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--burgundy); margin-bottom:1.5rem; line-height:1.4; }
    .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:.8rem; max-width:500px; margin:0 auto 1.5rem; }
    .quiz-opt  { padding:1rem; border:2px solid #e8d8d8; border-radius:10px; background:var(--cream); cursor:pointer; font-size:.95rem; transition:all .2s; }
    .quiz-opt:hover   { border-color:var(--rose); background:#fef0f0; }
    .quiz-opt.correct { border-color:#3a7d44; background:#d4edda; color:#1a5e2a; }
    .quiz-opt.wrong   { border-color:var(--rose); background:#f8d7da; color:#7b1f27; }
    .quiz-result { font-size:1.1rem; font-weight:500; margin-bottom:1rem; min-height:1.5em; }
    .score-bar { width:100%; background:#f0e4e4; border-radius:20px; height:12px; overflow:hidden; margin-top:.5rem; }
    .score-fill { height:100%; background:var(--burgundy); border-radius:20px; transition:width .5s; }

    /* Calc */
    .calc-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:1.5rem; }
    .calc-item { background:var(--cream); border-radius:12px; padding:1.5rem; border:1.5px solid #e8d8d8; }
    .calc-item h4 { font-family:'Playfair Display',serif; color:var(--burgundy); margin-bottom:1rem; }
    .calc-result { background:var(--burgundy); color:white; border-radius:10px; padding:1rem; text-align:center; margin-top:1rem; }
    .calc-result .total { font-size:1.8rem; font-family:'Playfair Display',serif; }
    .qty-ctrl { display:flex; align-items:center; gap:.5rem; }
    .qty-btn  { width:32px; height:32px; border:1.5px solid var(--burgundy); background:white; border-radius:6px; font-size:1.1rem; cursor:pointer; color:var(--burgundy); display:flex; align-items:center; justify-content:center; }
    .qty-val  { min-width:40px; text-align:center; font-weight:600; font-size:1rem; }
  </style>
</head>
<body>

<nav id="main-nav"></nav>

<header class="site-header">
  <h1>Web programozás-1 Előadás Házi feladat</h1>
  <p class="subtitle">📱 Single Page Application – React SPA</p>
</header>

<main>
  <div id="spa-root"></div>
</main>

<footer id="main-footer"></footer>
<script src="js/shared-nav.js"></script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
/* =====================================================
   SPA – Két menüpont: Kvíz + Ár-kalkulátor
   Komponensek + useState
   Madarász Dóra | TFO727
   ===================================================== */
const { useState, useEffect, useCallback } = React;

// ── Adatok ───────────────────────────────────────────────
const QUIZ_QUESTIONS = [
  { q: 'Melyik torta nyerte a „Magyarország Tortája" díjat?',
    opts: ['Dobos torta','Legényfogó','Ferrero','Ünnepi diótorta'], answer: 1 },
  { q: 'Melyik sütemény típusa a Franciakrémes?',
    opts: ['torta','pite','krémes','bejgli'], answer: 2 },
  { q: 'Mi a Paleolit étcsokoládé típusa?',
    opts: ['torta','különleges torta','pite','vegyes'], answer: 1 },
  { q: 'Melyik sütemény NEM pite?',
    opts: ['Almás','Zserbó','Dobos','Flódni'], answer: 2 },
  { q: 'Milyen egységben mérik a bejgliket?',
    opts: ['db','kg','rúd','koszorú'], answer: 2 },
  { q: 'Melyik a Csokis kaland típusa?',
    opts: ['torta','különleges torta','tortaszelet','vegyes'], answer: 1 },
  { q: 'Mi a Ribizlihabos-almás réteges típusa?',
    opts: ['torta','különleges torta','vegyes','pite'], answer: 1 },
  { q: 'Melyik a legdrágább 24 szeletes torta az adatbázisban?',
    opts: ['Dobos (18400 Ft)','Pisztáciás-málnás (18400 Ft)','Ferrero (16200 Ft)','Oreo (16200 Ft)'], answer: 1 },
  { q: 'A Gesztenyepüré milyen egységben kapható?',
    opts: ['db','20 dkg','kg','rúd'], answer: 1 },
  { q: 'Melyik tortát értékesítik „koszorú" egységben?',
    opts: ['Mákos-szilvalekváros','Diós-mákos','Mézeskalács','Rigó Jancsi'], answer: 1 },
];

const CALC_ITEMS = [
  { id:1, nev:'Dobos torta', egyseg:'16 szeletes', egysegAr:9000 },
  { id:2, nev:'Ferrero torta', egyseg:'24 szeletes', egysegAr:16200 },
  { id:3, nev:'Tiramisu tortaszelet', egyseg:'db', egysegAr:600 },
  { id:4, nev:'Sacher torta', egyseg:'8 szeletes', egysegAr:8200 },
  { id:5, nev:'Eszterházy torta', egyseg:'16 szeletes', egysegAr:8400 },
  { id:6, nev:'Feketeerdő', egyseg:'16 szeletes', egysegAr:9000 },
  { id:7, nev:'Oreo torta', egyseg:'16 szeletes', egysegAr:10900 },
  { id:8, nev:'Palermo', egyseg:'8 szeletes', egysegAr:5700 },
];

// ── Quiz komponens ─────────────────────────────────────────
function QuizApp() {
  const [qIdx, setQIdx]       = useState(0);
  const [score, setScore]     = useState(0);
  const [selected, setSelected] = useState(null);
  const [finished, setFinished] = useState(false);
  const [streak, setStreak]   = useState(0);

  const q = QUIZ_QUESTIONS[qIdx];

  function handleAnswer(i) {
    if (selected !== null) return;
    setSelected(i);
    const correct = i === q.answer;
    if (correct) { setScore(s=>s+1); setStreak(s=>s+1); }
    else setStreak(0);
    setTimeout(() => {
      if (qIdx + 1 >= QUIZ_QUESTIONS.length) setFinished(true);
      else { setQIdx(n=>n+1); setSelected(null); }
    }, 1100);
  }

  function restart() {
    setQIdx(0); setScore(0); setSelected(null); setFinished(false); setStreak(0);
  }

  if (finished) {
    const pct = Math.round(score / QUIZ_QUESTIONS.length * 100);
    return (
      <div className="quiz-card">
        <div style={{fontSize:'4rem', marginBottom:'1rem'}}>
          {pct >= 80 ? '🏆' : pct >= 60 ? '🎂' : '🍪'}
        </div>
        <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:'1.6rem',color:'var(--burgundy)',marginBottom:'.5rem'}}>
          Kvíz befejezve!
        </h3>
        <p style={{fontSize:'1.1rem',marginBottom:'1rem'}}>
          Eredmény: <strong style={{color:'var(--burgundy)'}}>{score} / {QUIZ_QUESTIONS.length}</strong> — {pct}%
        </p>
        <p style={{color:'#666',marginBottom:'1.5rem'}}>
          {pct >= 80 ? 'Kiváló! Igazi cukrászda-szakértő vagy! 🌟' :
           pct >= 60 ? 'Szép eredmény! Érdemes még tanulni. 🎓' :
           'Még van mit tanulni a sütemények világából! 📚'}
        </p>
        <div className="score-bar" style={{marginBottom:'1.5rem'}}>
          <div className="score-fill" style={{width:`${pct}%`}}></div>
        </div>
        <button className="btn btn-primary" onClick={restart}>🔄 Újra játszom</button>
      </div>
    );
  }

  return (
    <div className="quiz-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem',maxWidth:'500px',margin:'0 auto 1rem'}}>
        <span style={{fontSize:'.85rem',color:'#888'}}>{qIdx+1} / {QUIZ_QUESTIONS.length}</span>
        <span style={{fontSize:'.85rem',color:'var(--gold)',fontWeight:600}}>
          {streak >= 3 ? `🔥 ${streak} helyes!` : `⭐ ${score} pont`}
        </span>
      </div>
      <div className="score-bar" style={{maxWidth:'500px',margin:'0 auto 1.5rem'}}>
        <div className="score-fill" style={{width:`${(qIdx/QUIZ_QUESTIONS.length)*100}%`}}></div>
      </div>

      <p className="quiz-q">{q.q}</p>

      <div className="quiz-opts">
        {q.opts.map((opt, i) => {
          let cls = 'quiz-opt';
          if (selected !== null) {
            if (i === q.answer) cls += ' correct';
            else if (i === selected) cls += ' wrong';
          }
          return (
            <button key={i} className={cls} onClick={() => handleAnswer(i)}>
              {opt}
            </button>
          );
        })}
      </div>

      {selected !== null && (
        <div className="quiz-result" style={{color: selected === q.answer ? '#1a5e2a' : '#7b1f27'}}>
          {selected === q.answer ? '✅ Helyes! Gratulálok!' : `❌ Helytelen! A helyes válasz: ${q.opts[q.answer]}`}
        </div>
      )}
    </div>
  );
}

// ── Kalkulátor komponens ──────────────────────────────────
function CounterItem({ item, qty, onQty }) {
  return (
    <div className="calc-item">
      <h4>{item.nev}</h4>
      <p style={{fontSize:'.85rem',color:'#888',marginBottom:'.8rem'}}>
        {item.egysegAr.toLocaleString('hu-HU')} Ft / {item.egyseg}
      </p>
      <div className="qty-ctrl">
        <button className="qty-btn" onClick={()=>onQty(item.id, -1)} disabled={qty===0}>−</button>
        <span className="qty-val">{qty}</span>
        <button className="qty-btn" onClick={()=>onQty(item.id, +1)}>+</button>
        <span style={{marginLeft:'.5rem',fontWeight:600,color:'var(--burgundy)'}}>
          = {(qty * item.egysegAr).toLocaleString('hu-HU')} Ft
        </span>
      </div>
    </div>
  );
}

function CalcApp() {
  const [qtys, setQtys] = useState(() => Object.fromEntries(CALC_ITEMS.map(i=>[i.id,0])));
  const [discount, setDiscount] = useState(0);
  const [note, setNote]         = useState('');
  const [saved, setSaved]       = useState([]);

  function handleQty(id, delta) {
    setQtys(prev => ({ ...prev, [id]: Math.max(0, (prev[id]||0) + delta) }));
  }

  const subtotal = CALC_ITEMS.reduce((s,item) => s + item.egysegAr * (qtys[item.id]||0), 0);
  const discAmt  = Math.round(subtotal * discount / 100);
  const total    = subtotal - discAmt;

  function saveOrder() {
    if (total === 0) return;
    const order = {
      id: Date.now(),
      items: CALC_ITEMS.filter(i=>qtys[i.id]>0).map(i=>({ nev:i.nev, qty:qtys[i.id], ar:i.egysegAr*qtys[i.id] })),
      total, discount, note,
      date: new Date().toLocaleTimeString('hu-HU')
    };
    setSaved(prev => [order, ...prev.slice(0,4)]);
    setQtys(Object.fromEntries(CALC_ITEMS.map(i=>[i.id,0])));
    setNote('');
    setDiscount(0);
  }

  return (
    <div>
      <div className="calc-grid">
        {CALC_ITEMS.map(item => (
          <CounterItem key={item.id} item={item} qty={qtys[item.id]||0} onQty={handleQty} />
        ))}
      </div>

      <div style={{background:'white',borderRadius:'14px',padding:'1.5rem',marginTop:'1.5rem',boxShadow:'0 4px 20px var(--shadow)'}}>
        <h3 style={{fontFamily:"'Playfair Display',serif",color:'var(--burgundy)',marginBottom:'1rem'}}>🧮 Összesítő</h3>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1rem'}}>
          <div>
            <label>Megjegyzés</label>
            <input value={note} onChange={e=>setNote(e.target.value)} placeholder="pl. Rendelésnév…" />
          </div>
          <div>
            <label>Kedvezmény (%)</label>
            <input type="number" min="0" max="50" value={discount} onChange={e=>setDiscount(Number(e.target.value))} />
          </div>
        </div>

        <div className="calc-result">
          {discount > 0 && <div style={{fontSize:'.9rem',opacity:.8}}>Részösszeg: {subtotal.toLocaleString('hu-HU')} Ft</div>}
          {discount > 0 && <div style={{fontSize:'.9rem',opacity:.8}}>Kedvezmény ({discount}%): −{discAmt.toLocaleString('hu-HU')} Ft</div>}
          <div className="total">{total.toLocaleString('hu-HU')} Ft</div>
          <div style={{fontSize:'.85rem',opacity:.8,marginBottom:'1rem'}}>Végösszeg</div>
          <button className="btn btn-primary" onClick={saveOrder} disabled={total===0}
            style={{background:'white',color:'var(--burgundy)'}}>
            💾 Rendelés mentése
          </button>
        </div>
      </div>

      {saved.length > 0 && (
        <div style={{marginTop:'1.5rem'}}>
          <h3 style={{fontFamily:"'Playfair Display',serif",color:'var(--burgundy)',marginBottom:'1rem'}}>📜 Mentett rendelések</h3>
          {saved.map(o => (
            <div key={o.id} style={{background:'white',borderRadius:'10px',padding:'1rem',marginBottom:'.8rem',boxShadow:'0 2px 8px var(--shadow)',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'.5rem'}}>
              <div>
                <strong style={{color:'var(--burgundy)'}}>{o.total.toLocaleString('hu-HU')} Ft</strong>
                {o.note && <span style={{marginLeft:'.5rem',color:'#888',fontSize:'.85rem'}}>– {o.note}</span>}
                <div style={{fontSize:'.8rem',color:'#aaa'}}>{o.items.map(i=>`${i.nev} ×${i.qty}`).join(', ')}</div>
              </div>
              <span style={{fontSize:'.8rem',color:'#bbb'}}>{o.date}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── SPA Root ──────────────────────────────────────────────
function SPA() {
  const [tab, setTab] = useState('quiz');

  return (
    <div>
      <div className="spa-menu">
        <button className={`spa-tab ${tab==='quiz'?'active':''}`} onClick={()=>setTab('quiz')}>
          🎯 Cukrászda Kvíz
        </button>
        <button className={`spa-tab ${tab==='calc'?'active':''}`} onClick={()=>setTab('calc')}>
          🧮 Rendelés-kalkulátor
        </button>
      </div>

      <div className="card" style={{padding:'1.5rem'}}>
        {tab === 'quiz' ? (
          <>
            <h2 style={{fontFamily:"'Playfair Display',serif",color:'var(--burgundy)',marginBottom:'1.5rem'}}>
              🎯 Teszteld a cukrászda-ismereteidet!
            </h2>
            <QuizApp />
          </>
        ) : (
          <>
            <h2 style={{fontFamily:"'Playfair Display',serif",color:'var(--burgundy)',marginBottom:'1.5rem'}}>
              🧮 Rendelés-kalkulátor
            </h2>
            <CalcApp />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('spa-root')).render(<SPA />);
</script>
</body>
</html>
